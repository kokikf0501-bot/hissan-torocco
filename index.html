<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- iPadでの拡大縮小を防ぎ、タップ操作に最適化 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ひきざんトロッコ｜算数大冒険</title>
<style>
/* ===========================================================
   基本設定
   =========================================================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent; /* iPadのタップ時の青いハイライトを消す */
  user-select: none;
  -webkit-user-select: none;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Yu Gothic", sans-serif;
  background: #0b1d3a;
  touch-action: manipulation; /* ダブルタップズーム防止 */
}

#game {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* 画面（シーン）共通 */
.screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.screen.active { display: flex; }

/* ===========================================================
   タイトル画面（表紙）／クリア画面：渓谷＋コックピットの共通シーン
   =========================================================== */
/* 渓谷の空（プレイ画面と同じ冒険感） */
.scene#titleScreen,
.scene#clearScreen {
  background: linear-gradient(180deg,
    #8fd0ee 0%, #a9dbf0 28%, #d6eef2 45%,
    #c9a468 47%, #8a5e34 75%, #5e3d22 100%);
  overflow: hidden;
}
#titleScreen { text-align: center; color: #fff; z-index: 30; background: #8fd0ee; }

/* 余白を埋める、ぼかして拡大した背景 */
.cover-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  filter: blur(18px) brightness(.85);
  transform: scale(1.1);   /* ぼかしの端を隠す */
}
/* 表紙イラスト全体を切らさず表示 */
.cover-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  z-index: 1;
}
/* 表紙のスタートボタン（イラストの下のほうに重ねる） */
.cover-start {
  position: absolute;
  left: 50%;
  bottom: 7%;
  transform: translateX(-50%);
  z-index: 10;
  animation: startPulse 1.1s ease-in-out infinite;
}
.cover-start:active { animation: none; }
@keyframes startPulse {
  0%,100% { transform: translateX(-50%) scale(1); }
  50%     { transform: translateX(-50%) scale(1.06); }
}

/* 画面中央にのせる文字・ボタンのまとまり */
.title-content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
}
/* 表紙の飾り（浮遊する算数記号） */
.title-deco { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
.title-deco span {
  position: absolute;
  font-size: clamp(28px, 6vw, 56px);
  font-weight: 900;
  text-shadow: 0 3px 0 rgba(0,0,0,.18);
  opacity: .9;
  animation: decoFloat 3.2s ease-in-out infinite;
}
.title-deco span:nth-child(odd)  { animation-duration: 3.8s; }
.title-deco span:nth-child(3n)   { animation-delay: -1.4s; }
.title-deco span:nth-child(3n+1) { animation-delay: -0.7s; }
@keyframes decoFloat {
  0%,100% { transform: translateY(0) rotate(-6deg); }
  50%     { transform: translateY(-16px) rotate(6deg); }
}
.title-badge {
  font-size: clamp(16px, 3.2vw, 28px);
  font-weight: 800;
  color: #5e3d22;
  background: #ffe14d;
  padding: 6px 22px;
  border-radius: 999px;
  box-shadow: 0 4px 0 #c9a000;
  margin-bottom: 14px;
}
.title-logo {
  font-size: clamp(46px, 11vw, 110px);
  font-weight: 900;
  line-height: 1.02;
  letter-spacing: 2px;
  color: #ffe14d;
  text-shadow: 0 5px 0 #b5651d, 0 9px 0 #7a3f10, 0 14px 20px rgba(0,0,0,.45);
  transform: rotate(-3deg);
  margin-bottom: 14px;
}
.title-sub {
  font-size: clamp(18px, 3.5vw, 32px);
  font-weight: 800;
  color: #fff;
  background: #e8513f;
  padding: 8px 28px;
  border-radius: 999px;
  box-shadow: 0 4px 0 #a8331f;
  margin-bottom: 42px;
  letter-spacing: 1px;
}
@keyframes bob {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50%      { transform: translateY(-14px) rotate(2deg); }
}
/* クリア画面のコックピットはゆっくり待機アニメ */
#clearScreen .cockpit { animation: cockpitShake 1s ease-in-out infinite; }

/* 大きなボタン共通 */
.big-btn {
  font-family: inherit;
  font-size: clamp(26px, 5vw, 44px);
  font-weight: 900;
  color: #fff;
  background: #34c759;
  border: none;
  border-radius: 20px;
  padding: 22px 70px;
  box-shadow: 0 7px 0 #1f8c3c, 0 10px 22px rgba(0,0,0,.4);
  cursor: pointer;
  transition: transform .08s, box-shadow .08s;
}
.big-btn:active {
  transform: translateY(5px);
  box-shadow: 0 2px 0 #1f8c3c, 0 4px 10px rgba(0,0,0,.4);
}
.big-btn.retry { background: #ffb02e; box-shadow: 0 7px 0 #c47e10, 0 10px 22px rgba(0,0,0,.4); }
.big-btn.retry:active { box-shadow: 0 2px 0 #c47e10; }

/* ===========================================================
   プレイ画面：疑似3D空間
   =========================================================== */
#playScreen {
  /* 冒険感のある青空＋渓谷の地平線 */
  background: linear-gradient(180deg,
      #8fd0ee 0%,      /* 高い空 */
      #a9dbf0 28%,
      #d6eef2 45%,     /* 地平線のもや */
      #c9a468 47%,     /* 砂地のはじまり */
      #8a5e34 75%,
      #5e3d22 100%);   /* 手前の地面 */
  perspective: 360px;             /* 奥行きの強さ */
  perspective-origin: 50% 47%;    /* 消失点の位置（地平線あたり） */
  overflow: hidden;
}

/* 3D空間のコンテナ */
.world {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  z-index: 1;
}

/* --- 線路（地面）：奥から手前へ流れるストライプ --- */
.ground {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 1600px;
  height: 2400px;
  margin-left: -800px;
  transform-origin: 50% 100%;
  transform: rotateX(78deg) translateZ(0);
  background:
    /* 枕木（横線）：これがスクロールして疾走感を出す */
    repeating-linear-gradient(180deg,
      rgba(80,52,28,0)    0px,
      rgba(80,52,28,0)    70px,
      rgba(86,56,30,.85)  70px,
      rgba(86,56,30,.85)  100px),
    /* 砂地のベース（渓谷の地面） */
    linear-gradient(180deg, #d8b075 0%, #b07f42 55%, #7a5128 100%);
  animation: groundScroll 0.6s linear infinite;
}
@keyframes groundScroll {
  from { background-position-y: 0px, 0px; }
  to   { background-position-y: 100px, 0px; } /* 枕木1ピッチ分流す */
}

/* 2本のレール（中央に伸びる） */
.rail {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 14px;
  height: 2400px;
  transform-origin: 50% 100%;
  background: linear-gradient(90deg, #b9c4cc, #6e7d87, #b9c4cc);
  box-shadow: 0 0 6px rgba(255,255,255,.3);
}
.rail.left  { transform: rotateX(78deg) translateX(-90px); }
.rail.right { transform: rotateX(78deg) translateX(76px); }

/* 速度感を出すための流れる横スピード線 */
.speedlines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at 50% 42%, transparent 30%, rgba(0,0,0,.0) 31%);
}
.speedlines::before {
  content: "";
  position: absolute;
  left: 50%; top: 42%;
  width: 4px; height: 4px;
  box-shadow:
    -200px 80px 0 1px rgba(255,255,255,.25),
     220px 120px 0 1px rgba(255,255,255,.25),
    -320px 200px 0 2px rgba(255,255,255,.2),
     360px 240px 0 2px rgba(255,255,255,.2);
  animation: zoom 0.6s linear infinite;
}
@keyframes zoom {
  from { transform: scale(.4); opacity: .2; }
  to   { transform: scale(2.6); opacity: 0; }
}

/* --- 分岐の看板（左右の選択肢）：奥から手前へ迫ってくる --- */
.choices {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  pointer-events: none;
  z-index: 5;   /* ムードの上・コックピットより奥 */
}
.choice {
  position: absolute;
  top: 30%;
  width: 150px;
  height: 150px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 60px;
  font-weight: 900;
  color: #fff;
  border-radius: 18px;
  border: 6px solid #fff;
  box-shadow: 0 8px 26px rgba(0,0,0,.5);
  /* 奥（小さく）から手前（大きく）へ迫る */
  animation: approach 2.6s linear forwards;
}
.choice.left  { left: 26%;  background: #2f7ed8; }
.choice.right { right: 26%; background: #d8482f; }
/* ボスステージでは看板を下げて、ボスと重ならないようにする */
#playScreen.boss-active .choice { top: 46%; }

@keyframes approach {
  0%   { transform: translateY(-40px) scale(0.18); opacity: 0; }
  15%  { opacity: 1; }
  100% { transform: translateY(60px) scale(1.25); opacity: 1; }
}

/* --- 渓谷の岩壁（左右から迫る峡谷）。上は空が見えるギザギザの稜線 --- */
.cliff {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 52%;
  z-index: 2;
  background:
    linear-gradient(180deg, #c79a64 0%, #a9784a 38%, #7c5230 72%, #553820 100%);
}
/* 中央（線路）に向かって低くなり、上には空が広がる岩肌シルエット */
.cliff.left {
  left: 0;
  clip-path: polygon(
    0% 100%, 0% 34%, 8% 22%, 15% 31%, 23% 16%, 31% 28%,
    40% 21%, 49% 36%, 60% 52%, 72% 72%, 84% 90%, 70% 100%);
}
.cliff.right {
  right: 0;
  transform: scaleX(-1); /* 左右反転で対称に */
  clip-path: polygon(
    0% 100%, 0% 34%, 8% 22%, 15% 31%, 23% 16%, 31% 28%,
    40% 21%, 49% 36%, 60% 52%, 72% 72%, 84% 90%, 70% 100%);
}
/* 岩肌の陰影（斜めの地層）と、谷側の影 */
.cliff::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(-12deg,
      rgba(0,0,0,0) 0 26px, rgba(70,42,18,.14) 26px 34px);
}
.cliff.left::after, .cliff.right::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 55%, rgba(40,24,10,.45) 100%);
}

/* --- 一人称視点のコックピット（ダッシュボード＋手）：手前に固定 --- */
.cockpit {
  position: absolute;
  left: 50%;
  bottom: -2px;
  transform: translateX(-50%);
  width: 118%;                 /* 少し画面より広げて迫力を出す */
  max-width: 1500px;
  height: auto;
  z-index: 7;                  /* 線路や看板より手前、HUDより奥 */
  pointer-events: none;
  filter: drop-shadow(0 -8px 16px rgba(0,0,0,.4));
}
/* 走行中の細かな上下振動 */
#playScreen.active .cockpit { animation: cockpitShake 0.5s ease-in-out infinite; }
@keyframes cockpitShake {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%     { transform: translateX(-50%) translateY(-4px); }
}

/* ===========================================================
   HUD（問題・スコア）
   =========================================================== */
.hud {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}
/* 問題表示 */
.question {
  position: absolute;
  top: 18px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,.95);
  color: #173a23;
  font-size: clamp(34px, 7vw, 64px);
  font-weight: 900;
  padding: 10px 34px;
  border-radius: 16px;
  box-shadow: 0 6px 0 rgba(0,0,0,.25);
  white-space: nowrap;
}
/* スコア（連続正解数） */
.score {
  position: absolute;
  top: 16px;
  right: 16px;
  background: #ffe14d;
  color: #7a4b00;
  font-size: clamp(18px, 3.5vw, 28px);
  font-weight: 900;
  padding: 8px 18px;
  border-radius: 14px;
  box-shadow: 0 4px 0 rgba(0,0,0,.25);
}
.score .num { font-size: 1.5em; }

/* 制限時間バー（10秒で減っていく） */
.timer-wrap {
  position: absolute;
  top: 92px;
  left: 50%;
  transform: translateX(-50%);
  width: min(70%, 560px);
  height: 18px;
  background: rgba(0,0,0,.4);
  border: 2px solid rgba(255,255,255,.7);
  border-radius: 12px;
  overflow: hidden;
}
.timer-bar {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, #34c759, #ffe14d);
}
/* 残り時間が少ないと赤く点滅 */
.timer-bar.danger {
  background: linear-gradient(90deg, #ff4d4d, #ff9a3d);
  animation: timerBlink .35s ease-in-out infinite;
}
@keyframes timerBlink { 50% { opacity: .45; } }

/* 「どっち！？」のあおり */
.prompt-go {
  position: absolute;
  bottom: 30%;
  left: 50%;
  transform: translateX(-50%);
  color: #ffe14d;
  font-size: clamp(22px, 4.5vw, 40px);
  font-weight: 900;
  text-shadow: 0 3px 6px rgba(0,0,0,.6);
  animation: blink 0.8s ease-in-out infinite;
}
@keyframes blink { 50% { opacity: .35; } }

/* 左右のタップ領域（画面の左半分・右半分） */
.tap-zones {
  position: absolute;
  inset: 0;
  display: flex;
  z-index: 20;
}
.tap-zone {
  flex: 1;
  cursor: pointer;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 24px;
  font-size: 50px;
  color: rgba(255,255,255,.35);
}
.tap-zone:active { background: rgba(255,255,255,.08); }

/* 正解時のキラッ */
.flash-correct {
  position: absolute; inset: 0; z-index: 25;
  background: radial-gradient(circle at 50% 50%, rgba(120,255,150,.5), transparent 60%);
  opacity: 0; pointer-events: none;
}
.flash-correct.show { animation: flashOk .45s ease-out; }
@keyframes flashOk { 0%{opacity:1;} 100%{opacity:0;} }

/* ===========================================================
   背景の禍々しさ（3問ごとにステップアップ）
   渓谷はそのまま、上から色（ムード）を重ねて雰囲気を変える。
   tier-0: さわやかな昼 → tier-3: 紫の魔界
   =========================================================== */
.mood {
  position: absolute;
  inset: 0;
  z-index: 3;            /* 渓谷・線路の上、ボス/看板/コックピットより下 */
  pointer-events: none;
  background: transparent;
  transition: background .6s ease;
}
/* tier-0（1〜3問目）：快晴 → ムードなし（透明） */

/* tier-1（4〜6問目）：夕暮れのオレンジ */
#playScreen.tier-1 .mood {
  background: linear-gradient(180deg, rgba(255,140,40,.20), rgba(150,50,20,.42));
}
/* tier-2（7〜9問目）：夜・青紫のたそがれ */
#playScreen.tier-2 .mood {
  background: linear-gradient(180deg, rgba(40,25,90,.50), rgba(8,4,30,.65));
}
/* tier-3（10問目・ラスボス）：紫×マゼンタの魔界。脈打つ */
#playScreen.tier-3 .mood {
  background: radial-gradient(circle at 50% 40%,
              rgba(150,20,160,.45) 0%, rgba(40,5,55,.66) 55%, rgba(10,0,18,.8) 100%);
  animation: moodPulse 1.4s ease-in-out infinite;
}
@keyframes moodPulse {
  0%,100% { opacity: 1; }
  50%     { opacity: .82; }
}

/* ===========================================================
   ラスボス P.O.C. OVERLORD（10問目）
   =========================================================== */
.boss {
  position: absolute;
  top: 8%;
  left: 50%;
  width: min(50%, 300px);
  transform: translateX(-50%) scale(0);
  transform-origin: 50% 60%;
  filter: drop-shadow(0 0 26px rgba(190,50,230,.9));
  z-index: 3;            /* 看板やトロッコより奥 */
  pointer-events: none;
  display: none;
  will-change: transform;
}
/* ボスステージ中だけ表示し、登場→浮遊アニメ */
#playScreen.boss-active .boss {
  display: block;
  animation:
    bossEnter 0.9s cubic-bezier(.2,1.5,.4,1) forwards,
    bossFloat 3s ease-in-out 0.9s infinite;
}
@keyframes bossEnter {
  0%   { transform: translateX(-50%) scale(0) rotate(-25deg); opacity: 0; }
  100% { transform: translateX(-50%) scale(1) rotate(0deg);   opacity: 1; }
}
@keyframes bossFloat {
  0%,100% { transform: translateX(-50%) translateY(0)     rotate(-1.5deg); }
  50%     { transform: translateX(-50%) translateY(-16px) rotate(1.5deg); }
}
/* 撃破演出：光って弾けて消える */
.boss.defeat {
  animation: bossDefeat 1.1s ease-in forwards !important;
}
@keyframes bossDefeat {
  0%   { transform: translateX(-50%) scale(1)    rotate(0deg);  filter: brightness(1) drop-shadow(0 0 26px rgba(190,50,230,.9)); }
  35%  { transform: translateX(-50%) scale(1.12) rotate(10deg); filter: brightness(2.4) drop-shadow(0 0 50px #fff); }
  70%  { transform: translateX(-50%) scale(1.18) rotate(-12deg);filter: brightness(3) drop-shadow(0 0 60px #fff); }
  100% { transform: translateX(-50%) scale(0.1)  rotate(40deg); filter: brightness(4); opacity: 0; }
}

/* ボスの攻撃：闇の弾（スカル）がこちらに迫ってくる */
.boss-fx { position: absolute; inset: 0; z-index: 9; pointer-events: none; overflow: hidden; }
.boss-bolt {
  position: absolute;
  left: 50%;
  top: 40%;                /* ボスが抱える宝珠あたりから発射 */
  width: 64px; height: 64px;
  margin: -32px 0 0 -32px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 42%,
              #ff8af0 0%, #ff3ad8 32%, #b41ad0 55%, #5a0a8a 78%, transparent 80%);
  box-shadow: 0 0 28px 10px rgba(225,45,210,.85);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  animation: bolt 1s ease-in forwards;
}
.boss-bolt::after { content: "💀"; filter: brightness(0.6) saturate(2); }
@keyframes bolt {
  0%   { transform: translate(0,0) scale(0.2);                 opacity: 0; }
  12%  { opacity: 1; }
  100% { transform: translate(var(--dx,0), 230px) scale(5.5);  opacity: 0; }
}

/* 攻撃の着弾フラッシュ（画面にビシッと当たる感じ） */
.boss-impact {
  position: absolute; inset: 0; z-index: 8; pointer-events: none; opacity: 0;
  background: radial-gradient(circle at 50% 58%, rgba(255,70,225,.55), transparent 62%);
}
.boss-impact.show { animation: impactFlash .26s ease-out; }
@keyframes impactFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

/* ===========================================================
   不正解：落下＆暗転アニメーション
   =========================================================== */
#playScreen.crash {
  animation: shake 0.5s, fadeBlack 1.2s 0.5s forwards;
}
/* 脱線時はコックピットを大きく揺らす */
#playScreen.crash .cockpit { animation: cockpitCrash 0.5s ease-in-out; }
@keyframes shake {
  0%,100% { transform: translate(0,0); }
  20% { transform: translate(-12px, 6px) rotate(-2deg); }
  40% { transform: translate(12px, -6px) rotate(2deg); }
  60% { transform: translate(-10px, 8px) rotate(-1deg); }
  80% { transform: translate(10px, -4px) rotate(1deg); }
}
@keyframes cockpitCrash {
  0%   { transform: translateX(-50%) translateY(0) rotate(0); }
  30%  { transform: translateX(-50%) translateY(14px) rotate(-3deg); }
  60%  { transform: translateX(-50%) translateY(8px) rotate(3deg); }
  100% { transform: translateX(-50%) translateY(20px) rotate(0); }
}
@keyframes fadeBlack {
  from { filter: brightness(1); }
  to   { filter: brightness(0); }
}

/* ===========================================================
   ゲームオーバー画面
   =========================================================== */
#overScreen {
  background: linear-gradient(180deg, #2a0f12 0%, #561d22 100%);
  color: #fff;
  text-align: center;
  z-index: 40;
}
.over-title {
  font-size: clamp(40px, 9vw, 90px);
  font-weight: 900;
  color: #ff6b5e;
  text-shadow: 0 4px 0 #7a2018;
  margin-bottom: 10px;
}
.over-cart { font-size: clamp(70px, 14vw, 140px); margin-bottom: 10px; animation: bob 1.2s ease-in-out infinite; }
.result {
  font-size: clamp(22px, 4.5vw, 38px);
  font-weight: 700;
  margin-bottom: 6px;
}
.result .big {
  display: inline-block;
  font-size: 1.8em;
  font-weight: 900;
  color: #ffe14d;
  margin: 0 6px;
}
.over-correct {
  font-size: clamp(18px, 3.5vw, 26px);
  background: rgba(255,255,255,.12);
  padding: 8px 20px;
  border-radius: 12px;
  margin: 14px 0 36px;
}
.over-correct b { color: #9be79b; }

/* ===========================================================
   クリア画面（1枚イラスト＋オーバーレイ）
   =========================================================== */
#clearScreen { z-index: 40; background: #cfe6f2; }

/* イラストと同じ比率の舞台。中にイラストを敷き、％でオーバーレイ位置を合わせる */
.clear-stage {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(100%, calc(100vh * 3054 / 1376));
  aspect-ratio: 3054 / 1376;
  z-index: 1;
  container-type: size;   /* 中の文字をイラストの縮尺(cqw)に合わせる */
}
.clear-img { display: block; width: 100%; height: 100%; }

/* イラストの「最終スコア／クリアした計算」を隠してタイムを出す板 */
.clear-time-overlay {
  position: absolute;
  left: 52%;
  top: 38%;
  transform: translate(-50%, -50%);
  width: 21%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4cqw;
  background: #f3e2c0;                 /* 木の看板っぽいクリーム色で確実に隠す */
  border: 0.3cqw solid #8a5a2b;
  border-radius: 1.4cqw;
  padding: 1.4cqw 1.6cqw;
  box-shadow: 0 0.3cqw 0 #6e4520, inset 0 0 0 0.2cqw rgba(255,255,255,.4);
}
.ct-label {
  font-size: 2.3cqw;
  font-weight: 800;
  color: #8a4b18;
  letter-spacing: 1px;
}
.ct-value {
  font-size: 5cqw;
  font-weight: 900;
  color: #1c6b8a;
  line-height: 1;
  white-space: nowrap;
}
.ct-unit { font-size: 0.42em; font-weight: 800; color: #5e3d22; margin-left: 0.4cqw; }

/* イラストのボタンに重ねる、実際に押せるボタン */
.clear-btn {
  position: absolute;
  bottom: 6%;
  width: 19%;
  height: 13%;
  border: none;
  border-radius: 999px;
  font-family: inherit;
  font-weight: 900;
  color: #fff;
  font-size: 2.7cqw;
  cursor: pointer;
  box-shadow: 0 0.4cqw 0 rgba(0,0,0,.3);
  transition: transform .08s, box-shadow .08s;
}
.clear-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.3); }
.clear-btn.home  { left: 29%; background: linear-gradient(180deg,#ff7a8a,#e8455f); }
.clear-btn.retry { left: 50%; background: linear-gradient(180deg,#46c6e6,#2a8fc4); }
</style>
</head>
<body>
<div id="game">

  <!-- ============ タイトル画面（表紙＝1枚イラスト） ============ -->
  <section id="titleScreen" class="screen active">
    <!-- 余白を埋める、ぼかした背景 -->
    <img class="cover-bg" src="cover.png" alt="" aria-hidden="true">
    <!-- 表紙イラスト全体（タイトルを切らさず表示） -->
    <img class="cover-img" src="cover.png" alt="ひきざんトロッコ 算数大冒険">
    <button class="big-btn cover-start" id="startBtn">スタート</button>
  </section>

  <!-- ============ プレイ画面 ============ -->
  <section id="playScreen" class="screen">
    <!-- 渓谷の岩壁（左右） -->
    <div class="cliff left"></div>
    <div class="cliff right"></div>

    <!-- 疑似3D空間（線路・地面） -->
    <div class="world">
      <div class="ground"></div>
      <div class="rail left"></div>
      <div class="rail right"></div>
    </div>
    <div class="speedlines"></div>

    <!-- 時間帯・禍々しさのムード色（tierで変化） -->
    <div class="mood"></div>

    <!-- ラスボス：P.O.C. OVERLORD（10問目だけ登場） -->
    <img class="boss" id="boss" src="boss.png" alt="P.O.C. OVERLORD">
    <!-- ボスの攻撃エフェクト（こちらに飛んでくる闇の弾）の入れ物 -->
    <div class="boss-fx" id="bossFx"></div>
    <!-- 攻撃の着弾フラッシュ -->
    <div class="boss-impact" id="bossImpact"></div>

    <!-- 奥から迫ってくる左右の選択肢看板 -->
    <div class="choices" id="choices"></div>

    <!-- 一人称視点のトロッコ（コックピット＋手） -->
    <img class="cockpit" id="cockpit" src="cockpit.png" alt="">


    <!-- HUD -->
    <div class="hud">
      <div class="question" id="question">18 - 5 = ?</div>
      <div class="score">もんだい <span class="num" id="stageNum">1</span>/10</div>
      <!-- 制限時間バー（10秒） -->
      <div class="timer-wrap">
        <div class="timer-bar" id="timerBar"></div>
      </div>
      <div class="prompt-go" id="promptGo">どっちに すすむ？</div>
    </div>

    <!-- 左右タップ領域 -->
    <div class="tap-zones">
      <div class="tap-zone" id="zoneLeft">👈</div>
      <div class="tap-zone" id="zoneRight">👉</div>
    </div>

    <div class="flash-correct" id="flash"></div>
  </section>

  <!-- ============ ゲームオーバー画面 ============ -->
  <section id="overScreen" class="screen">
    <div class="over-cart">💥🛒</div>
    <h2 class="over-title">ゲームオーバー</h2>
    <p class="result">れんぞくせいかい <span class="big" id="finalScore">0</span> もん！</p>
    <p class="over-correct" id="overCorrect"></p>
    <button class="big-btn retry" id="retryBtn">もう いちど</button>
  </section>

  <!-- ============ クリア（ぜんもんとっぱ）画面＝1枚イラスト ============ -->
  <section id="clearScreen" class="screen">
    <!-- 余白を埋める、ぼかした背景 -->
    <img class="cover-bg" src="clear.png" alt="" aria-hidden="true">
    <!-- イラストと同じ比率の舞台（オーバーレイ位置を正確に合わせるため） -->
    <div class="clear-stage">
      <img class="clear-img" src="clear.png" alt="算数大冒険クリア！">
      <!-- イラストの「最終スコア／クリアした計算」を隠して、クリアタイムを表示 -->
      <div class="clear-time-overlay">
        <span class="ct-label">クリアタイム</span>
        <span class="ct-value"><span id="clearTime">0.0</span><span class="ct-unit">びょう</span></span>
      </div>
      <!-- 実際に押せるボタン（イラストのボタンに重ねる） -->
      <button class="clear-btn home"  id="clearHomeBtn">表紙へ戻る</button>
      <button class="clear-btn retry" id="clearRetryBtn">もう一度遊ぶ</button>
    </div>
  </section>

</div>

<script>
/* ===========================================================
   画面切り替えユーティリティ
   =========================================================== */
const screens = {
  title: document.getElementById('titleScreen'),
  play:  document.getElementById('playScreen'),
  over:  document.getElementById('overScreen'),
  clear: document.getElementById('clearScreen'),
};
function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

/* ===========================================================
   ゲーム状態
   =========================================================== */
const TOTAL_STAGES = 10;      // 全10問のステージ式
const TIME_LIMIT   = 10000;   // 1問あたりの制限時間（10秒）

let stage = 1;          // 現在の問題番号（1〜10）
let score = 0;          // 正解数
let current = null;     // 現在の問題 { a, b, answer, leftVal, rightVal, correctSide }
let locked = false;     // 演出中の入力ロック
let timerId = null;     // 制限時間タイマー
let dangerId = null;    // 残り時間わずかの警告タイマー

/* タイム計測：各問の「出題〜解答」にかかった時間を裏で合計する */
let totalTimeMs = 0;    // クリアまでの合計タイム（ミリ秒）
let qStartAt = 0;       // 現在の問題が表示された時刻

const elQuestion  = document.getElementById('question');
const elStageNum  = document.getElementById('stageNum');
const elChoices   = document.getElementById('choices');
const elFlash     = document.getElementById('flash');
const elPlay      = document.getElementById('playScreen');
const elTimerBar  = document.getElementById('timerBar');
const elBoss      = document.getElementById('boss');
const elBossFx    = document.getElementById('bossFx');
const elBossImpact= document.getElementById('bossImpact');

let bossAttackId = null; // ボスの連続攻撃タイマー

/* ===========================================================
   問題生成ロジック（ステージ式の難易度カーブ）
    1〜3問目 : 2桁(10〜20) − 1桁、繰り下がり なし（やさしい）
    4〜6問目 : 2桁(10〜20) − 1桁、繰り下がり ありなし混合
    7〜9問目 : 2桁(10〜20) − 1桁、繰り下がり あり（むずかしい）
    10問目   : 2桁 − 2桁、繰り下がり あり（ラスボス）
   =========================================================== */
function makeProblem(stage) {
  let a, b;

  if (stage >= TOTAL_STAGES) {
    // --- ラスボス：2桁 − 2桁（繰り下がりあり） ---
    for (let t = 0; t < 300; t++) {
      a = randInt(21, 99);
      b = randInt(11, a - 1);
      if ((a % 10) < (b % 10)) break; // 一の位で繰り下がりが発生する組み合わせ
    }
  } else {
    // --- 2桁(10〜20) − 1桁 ---
    let wantBorrow;
    if (stage <= 3)      wantBorrow = false;               // 繰り下がりなし
    else if (stage <= 6) wantBorrow = Math.random() < 0.5; // まざる
    else                 wantBorrow = true;                // 繰り下がりあり

    for (let t = 0; t < 300; t++) {
      a = randInt(11, 20);          // 2桁は20まで
      b = randInt(2, 9);            // 1桁
      if (b >= a) continue;
      const borrow = (a % 10) < b;  // aの一の位より引く数が大きい＝繰り下がり
      if (borrow === wantBorrow) break;
    }
  }
  const answer = a - b;

  // --- ダミー（おてつき）選択肢を生成 ---
  const dummy = makeDummy(a, b, answer);

  // 正解とダミーを左右ランダムに配置
  const correctSide = Math.random() < 0.5 ? 'left' : 'right';
  const leftVal  = correctSide === 'left'  ? answer : dummy;
  const rightVal = correctSide === 'right' ? answer : dummy;

  return { a, b, answer, leftVal, rightVal, correctSide };
}

/* 小2が陥りやすいミスを意図的にダミーにする */
function makeDummy(a, b, answer) {
  const candidates = [];
  const aOnes = a % 10, aTens = Math.floor(a / 10);
  const bOnes = b % 10, bTens = Math.floor(b / 10);

  // ミス1: 一の位を「大きい方-小さい方」で引いてしまう（繰り下がり無視）
  //   例) 52-18 → 一の位 8-2=6、十の位 5-1=4 → 46
  if (aOnes < bOnes) {
    const wrongOnes = bOnes - aOnes;
    const wrongTens = aTens - bTens; // 繰り下げないのでそのまま
    if (wrongTens >= 0) candidates.push(wrongTens * 10 + wrongOnes);
  }

  // ミス2: 繰り下がりを忘れる（一の位は正しく10を借りるが十の位を減らし忘れ）
  //   例) 52-18 → 一の位 12-8=4、十の位 5-1=4のはずが 5-1を忘れ… ここでは +10 のズレ
  candidates.push(answer + 10);

  // ミス3: 一の位だけ＋1/−1のうっかり（計算ミス）
  candidates.push(answer + 1);
  candidates.push(answer - 1);

  // 正解と同じ・負・100以上を除外し、重複も除く
  const valid = [...new Set(candidates)].filter(v => v !== answer && v > 0 && v < 100);

  if (valid.length > 0) {
    return valid[randInt(0, valid.length - 1)];
  }
  // 念のためのフォールバック（近い数字）
  let d;
  do { d = answer + randInt(-9, 9); } while (d === answer || d <= 0 || d >= 100);
  return d;
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

/* ===========================================================
   背景の禍々しさ（3問ごとに段階アップ）
   =========================================================== */
function setTier(stage) {
  let tier;
  if (stage <= 3)      tier = 0; // さわやかな昼
  else if (stage <= 6) tier = 1; // 夕暮れ
  else if (stage <= 9) tier = 2; // 夜の毒気
  else                 tier = 3; // 地獄（ラスボス）
  elPlay.classList.remove('tier-0', 'tier-1', 'tier-2', 'tier-3');
  elPlay.classList.add('tier-' + tier);
}

/* ===========================================================
   ラスボス P.O.C. OVERLORD の制御
   =========================================================== */
function startBoss() {
  elBoss.classList.remove('defeat');
  elBoss.style.display = '';        // CSS側の表示制御に戻す
  elPlay.classList.add('boss-active');
  // 周期的に闇の弾をこちらへ撃ってくる
  clearInterval(bossAttackId);
  bossAttackId = setInterval(spawnBolt, 850);
  setTimeout(spawnBolt, 1000);      // 登場直後に最初の一撃
}
function stopBoss() {
  elPlay.classList.remove('boss-active');
  elBoss.classList.remove('defeat');
  clearInterval(bossAttackId);
  bossAttackId = null;
  elBossFx.innerHTML = '';
}
/* 闇の弾を1発生成して、こちらに迫らせる */
function spawnBolt() {
  const bolt = document.createElement('div');
  bolt.className = 'boss-bolt';
  bolt.style.setProperty('--dx', (Math.random() * 2 - 1) * 170 + 'px'); // 左右にばらつき
  elBossFx.appendChild(bolt);
  // 着弾の瞬間に画面をフラッシュ
  setTimeout(() => {
    elBossImpact.classList.add('show');
    setTimeout(() => elBossImpact.classList.remove('show'), 260);
  }, 850);
  setTimeout(() => bolt.remove(), 1050);
}
/* 正解でボスを撃破 */
function defeatBoss() {
  clearInterval(bossAttackId);
  bossAttackId = null;
  elBossFx.innerHTML = '';
  elBoss.classList.add('defeat');
  elFlash.classList.add('show'); // 白フラッシュ
  setTimeout(() => elFlash.classList.remove('show'), 600);
}

/* ===========================================================
   制限時間タイマー（10秒）
   =========================================================== */
function startTimer() {
  clearTimers();
  qStartAt = performance.now();   // この問題の計測開始
  elTimerBar.classList.remove('danger');
  // バーをいったん満タンに戻してから10秒かけて減らす
  elTimerBar.style.transition = 'none';
  elTimerBar.style.width = '100%';
  void elTimerBar.offsetWidth; // 再描画を強制してアニメをやり直す
  elTimerBar.style.transition = `width ${TIME_LIMIT}ms linear`;
  elTimerBar.style.width = '0%';

  // 残り3秒で赤く点滅させて警告
  dangerId = setTimeout(() => elTimerBar.classList.add('danger'), TIME_LIMIT - 3000);
  // 時間切れ → ゲームオーバー
  timerId = setTimeout(() => {
    if (locked) return;
    locked = true;
    gameOver('timeup');
  }, TIME_LIMIT);
}
function clearTimers() {
  clearTimeout(timerId);
  clearTimeout(dangerId);
}

/* ===========================================================
   問題の表示
   =========================================================== */
function nextProblem() {
  current = makeProblem(stage);
  locked = false;

  elStageNum.textContent = stage;
  elQuestion.textContent = `${current.a} - ${current.b} = ?`;
  setTier(stage); // 背景の禍々しさを更新

  // 10問目だけラスボス登場、それ以外は退場
  if (stage >= TOTAL_STAGES) startBoss();
  else stopBoss();

  // 看板を作り直す（approachアニメをやり直すため）
  elChoices.innerHTML = '';
  const left  = document.createElement('div');
  left.className = 'choice left';
  left.textContent = current.leftVal;
  const right = document.createElement('div');
  right.className = 'choice right';
  right.textContent = current.rightVal;
  elChoices.appendChild(left);
  elChoices.appendChild(right);

  startTimer(); // 制限時間スタート
}

/* ===========================================================
   選択処理
   =========================================================== */
function choose(side) {
  if (locked || !current) return;
  locked = true;
  clearTimers();

  if (side === current.correctSide) {
    // --- 正解 ---
    totalTimeMs += performance.now() - qStartAt; // この問にかかった時間を合計に加える
    score++;
    elFlash.classList.add('show');
    setTimeout(() => elFlash.classList.remove('show'), 450);

    if (stage >= TOTAL_STAGES) {
      // 10問すべてクリア！ ボスを撃破してからクリア画面へ
      defeatBoss();
      setTimeout(winGame, 1200);
    } else {
      stage++;
      setTimeout(nextProblem, 350); // シームレスに次の問題へ
    }
  } else {
    // --- 不正解：落下＆暗転 → ゲームオーバー ---
    gameOver('wrong');
  }
}

/* 失敗（不正解 or 時間切れ）→ 落下演出 → ゲームオーバー画面 */
function gameOver(reason) {
  clearTimers();
  clearInterval(bossAttackId); // ボスの攻撃を止める
  bossAttackId = null;
  elTimerBar.style.transition = 'none'; // タイマーバーを止める
  elPlay.classList.add('crash');
  setTimeout(() => {
    elPlay.classList.remove('crash');
    document.getElementById('finalScore').textContent = score;
    // 時間切れか不正解かで前置きを変えつつ、正しい答えを振り返り表示
    const head = (reason === 'timeup') ? 'じかんぎれ！ ' : '';
    document.getElementById('overCorrect').innerHTML =
      `${head}${current.a} - ${current.b} の こたえは <b>${current.answer}</b> だよ`;
    showScreen('over');
  }, 1700); // shake(0.5s) + fadeBlack(1.2s)
}

/* 合計タイム（ミリ秒）を「12.3」や「1ぷん 5.3」の形に整える */
function formatTime(ms) {
  const sec = ms / 1000;
  if (sec >= 60) {
    const m = Math.floor(sec / 60);
    const s = (sec - m * 60).toFixed(1);
    return `${m}ぷん ${s}`;
  }
  return sec.toFixed(1);
}

/* 全問クリア */
function winGame() {
  clearTimers();
  stopBoss();
  document.getElementById('clearTime').textContent = formatTime(totalTimeMs);
  showScreen('clear');
}

/* ===========================================================
   ゲーム開始
   =========================================================== */
function startGame() {
  stage = 1;
  score = 0;
  totalTimeMs = 0;                  // タイムをリセット
  elStageNum.textContent = 1;
  clearTimers();
  stopBoss();                       // ボスの状態をリセット
  elPlay.classList.remove('crash');
  elTimerBar.classList.remove('danger');
  showScreen('play');
  nextProblem();
}

/* ===========================================================
   イベント登録
   =========================================================== */
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
document.getElementById('clearRetryBtn').addEventListener('click', startGame);
document.getElementById('clearHomeBtn').addEventListener('click', () => showScreen('title'));
document.getElementById('zoneLeft').addEventListener('click', () => choose('left'));
document.getElementById('zoneRight').addEventListener('click', () => choose('right'));

// キーボードでも操作できるように（PCでの動作確認用）
document.addEventListener('keydown', (e) => {
  if (!screens.play.classList.contains('active')) return;
  if (e.key === 'ArrowLeft')  choose('left');
  if (e.key === 'ArrowRight') choose('right');
});

/* 確認用ショートカット：URLの末尾に #boss を付けると
   最終ステージ（ラスボス P.O.C. OVERLORD）からスタートする */
function jumpToBossIfRequested() {
  if (location.hash === '#boss') {
    startGame();
    stage = TOTAL_STAGES;
    score = TOTAL_STAGES - 1;
    nextProblem();
  }
}
window.addEventListener('hashchange', jumpToBossIfRequested);
jumpToBossIfRequested();
</script>
</body>
</html>
