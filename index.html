<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- iPadでの拡大縮小を防ぎ、タップ操作に最適化 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ひきざんトロッコ｜算数大冒険</title>
<style>
/* ===========================================================
   基本設定
   =========================================================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent; /* iPadのタップ時の青いハイライトを消す */
  user-select: none;
  -webkit-user-select: none;
}

html, body {
  /* 画面を固定して、タップ時のスクロール/ずれを防ぐ */
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Yu Gothic", sans-serif;
  background: #0b1d3a;
  touch-action: manipulation; /* ダブルタップズーム防止 */
}

#game {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* 画面（シーン）共通 */
.screen {
  position: absolute;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.screen.active { display: flex; }

/* ===========================================================
   タイトル画面（表紙）／クリア画面：渓谷＋コックピットの共通シーン
   =========================================================== */
/* 渓谷の空（プレイ画面と同じ冒険感） */
.scene#titleScreen,
.scene#clearScreen {
  background: linear-gradient(180deg,
    #8fd0ee 0%, #a9dbf0 28%, #d6eef2 45%,
    #c9a468 47%, #8a5e34 75%, #5e3d22 100%);
  overflow: hidden;
}
#titleScreen { text-align: center; color: #fff; z-index: 30; background: #8fd0ee; }

/* 余白を埋める、ぼかして拡大した背景 */
.cover-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  filter: blur(18px) brightness(.85);
  transform: scale(1.1);   /* ぼかしの端を隠す */
}
/* 表紙イラスト全体を切らさず表示 */
.cover-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  z-index: 1;
}
/* 表紙のスタートボタン（イラストの下のほうに重ねる） */
.cover-start {
  position: absolute;
  left: 50%;
  bottom: 7%;
  transform: translateX(-50%);
  z-index: 10;
  animation: startPulse 1.1s ease-in-out infinite;
}
/* 押下時も中央寄せ(translateX(-50%))を保つ（右にずれるのを防止）。
   .big-btn:active より後に定義される＆ID指定で詳細度を上げて確実に勝たせる */
#titleScreen .cover-start:active { transform: translateX(-50%) translateY(4px); animation: none; }
@keyframes startPulse {
  0%,100% { transform: translateX(-50%) scale(1); }
  50%     { transform: translateX(-50%) scale(1.06); }
}

/* 画面中央にのせる文字・ボタンのまとまり */
.title-content {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
}
/* 表紙の飾り（浮遊する算数記号） */
.title-deco { position: absolute; inset: 0; z-index: 4; pointer-events: none; }
.title-deco span {
  position: absolute;
  font-size: clamp(28px, 6vw, 56px);
  font-weight: 900;
  text-shadow: 0 3px 0 rgba(0,0,0,.18);
  opacity: .9;
  animation: decoFloat 3.2s ease-in-out infinite;
}
.title-deco span:nth-child(odd)  { animation-duration: 3.8s; }
.title-deco span:nth-child(3n)   { animation-delay: -1.4s; }
.title-deco span:nth-child(3n+1) { animation-delay: -0.7s; }
@keyframes decoFloat {
  0%,100% { transform: translateY(0) rotate(-6deg); }
  50%     { transform: translateY(-16px) rotate(6deg); }
}
.title-badge {
  font-size: clamp(16px, 3.2vw, 28px);
  font-weight: 800;
  color: #5e3d22;
  background: #ffe14d;
  padding: 6px 22px;
  border-radius: 999px;
  box-shadow: 0 4px 0 #c9a000;
  margin-bottom: 14px;
}
.title-logo {
  font-size: clamp(46px, 11vw, 110px);
  font-weight: 900;
  line-height: 1.02;
  letter-spacing: 2px;
  color: #ffe14d;
  text-shadow: 0 5px 0 #b5651d, 0 9px 0 #7a3f10, 0 14px 20px rgba(0,0,0,.45);
  transform: rotate(-3deg);
  margin-bottom: 14px;
}
.title-sub {
  font-size: clamp(18px, 3.5vw, 32px);
  font-weight: 800;
  color: #fff;
  background: #e8513f;
  padding: 8px 28px;
  border-radius: 999px;
  box-shadow: 0 4px 0 #a8331f;
  margin-bottom: 42px;
  letter-spacing: 1px;
}
@keyframes bob {
  0%, 100% { transform: translateY(0) rotate(-2deg); }
  50%      { transform: translateY(-14px) rotate(2deg); }
}
/* クリア画面のコックピットはゆっくり待機アニメ */
#clearScreen .cockpit { animation: cockpitShake 1s ease-in-out infinite; }

/* 大きなボタン共通 */
.big-btn {
  font-family: inherit;
  font-size: clamp(26px, 5vw, 44px);
  font-weight: 900;
  color: #fff;
  background: #34c759;
  border: none;
  border-radius: 20px;
  padding: 22px 70px;
  box-shadow: 0 7px 0 #1f8c3c, 0 10px 22px rgba(0,0,0,.4);
  cursor: pointer;
  transition: transform .08s, box-shadow .08s;
}
.big-btn:active {
  transform: translateY(5px);
  box-shadow: 0 2px 0 #1f8c3c, 0 4px 10px rgba(0,0,0,.4);
}
.big-btn.retry { background: #ffb02e; box-shadow: 0 7px 0 #c47e10, 0 10px 22px rgba(0,0,0,.4); }
.big-btn.retry:active { box-shadow: 0 2px 0 #c47e10; }

/* ===========================================================
   プレイ画面：疑似3D空間
   =========================================================== */
#playScreen {
  background: #1a1426;   /* ぼかし背景の隙間用の暗色 */
  overflow: hidden;
}

/* image_2 のコックピット＋山道シーン（舞台） */
.play-stage {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(100%, calc(100vh * 2752 / 1536));
  aspect-ratio: 2752 / 1536;
  container-type: size;   /* 中の要素を画像縮尺(cqw)で配置 */
  overflow: hidden;
  z-index: 1;
  /* トロッコの振動（ガタガタ感）。コンボで揺れ幅・速さUP */
  --sh: calc((0.6 + var(--combo,0) * 0.5) * 1px);
  animation: rumble calc((0.2 - var(--combo,0) * 0.011) * 1s) linear infinite;
  will-change: transform;
}
/* どの瞬間も translate(-50%,-50%) を保ちつつ、小さく上下左右に揺らす */
@keyframes rumble {
  0%,100% { transform: translate(-50%, calc(-50% - var(--sh))) rotate(var(--tilt,0deg)) scale(var(--tsc,1)); }
  20%     { transform: translate(calc(-50% + var(--sh) * 0.5), calc(-50% + var(--sh) * 0.8)) rotate(var(--tilt,0deg)) scale(var(--tsc,1)); }
  40%     { transform: translate(calc(-50% - var(--sh) * 0.3), calc(-50% - var(--sh) * 0.6)) rotate(var(--tilt,0deg)) scale(var(--tsc,1)); }
  60%     { transform: translate(calc(-50% + var(--sh) * 0.2), calc(-50% + var(--sh))) rotate(var(--tilt,0deg)) scale(var(--tsc,1)); }
  80%     { transform: translate(calc(-50% - var(--sh) * 0.4), calc(-50% - var(--sh) * 0.3)) rotate(var(--tilt,0deg)) scale(var(--tsc,1)); }
}
.scene-img {
  position:absolute; inset:0; width:100%; height:100%;
  transition: filter .6s ease;   /* ステージで雰囲気が変わる */
}
/* 3段階の険しさ：シーンのフィルター */
#playScreen.tier-0 .scene-img { filter: brightness(1.10) saturate(1.06); }     /* 1〜3問: 明るく爽やか */
#playScreen.tier-1 .scene-img { filter: none; }                                /* 4〜6問: そのまま険しい山道 */
#playScreen.tier-2 .scene-img { filter: brightness(.82) contrast(1.08) saturate(1.2) hue-rotate(-12deg); } /* 7〜9問: 暗い・赤み（急勾配） */
#playScreen.tier-3 .scene-img { filter: brightness(.68) saturate(1.25) hue-rotate(-22deg); }              /* 10問: 魔界 */
/* 7〜9問は車体を少し傾けて急勾配感 */
#playScreen.tier-2 .play-stage { --tilt: -2.2deg; --tsc: 1.07; }

/* --- スピード線（集中線）：消失点(50%,40%)から放射状に流れる --- */
.speedlines {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
  opacity: calc(0.16 + var(--combo,0) * 0.055);   /* コンボで濃く */
  transition: opacity .4s;
  mix-blend-mode: screen;
}
.speedlines span {
  position: absolute;
  left: 50%;
  top: 40%;
  width: 0.7cqw;
  height: 70cqw;
  margin-left: -0.35cqw;
  background: linear-gradient(to bottom,
    rgba(255,255,255,0) 0%, rgba(255,255,255,.95) 55%, rgba(255,255,255,0) 100%);
  transform-origin: 50% 0;     /* 上端＝消失点を軸に放射 */
  animation: streak calc((1.25 - var(--combo,0) * 0.075) * 1s) linear infinite;
}
@keyframes streak {
  0%   { transform: rotate(var(--a,0deg)) translateY(0) scaleY(.08); opacity: 0; }
  18%  { opacity: 1; }
  100% { transform: rotate(var(--a,0deg)) translateY(9cqw) scaleY(1); opacity: 0; }
}

/* --- 速度計（コンボで針が右へ） 中心≈(57.4%,74.6%) --- */
.speedo {
  position: absolute;
  left: 60.5%;
  top: 73.4%;
  width: 0;
  height: 0;
  z-index: 3;
}
.speedo-face {
  position: absolute;
  left: 50%; top: 50%;
  width: 5.8cqw; height: 5.8cqw;
  transform: translate(-50%,-50%);
  border-radius: 50%;
  background: #f3e7b5;     /* メーター面のクリーム色（元の針を隠す） */
}
.speedo-needle {
  position: absolute;
  left: 50%; top: 50%;
  width: 0.7cqw;
  height: 3.1cqw;            /* 針の長さ */
  background: linear-gradient(#2a3a6a,#3f63b6);
  border-radius: 0.5cqw;
  transform-origin: 50% 100%;   /* 下端(中心)を軸に回転 */
  transform: translate(-50%,-100%) rotate(calc(var(--combo,0) * 18deg - 60deg));
  transition: transform .5s cubic-bezier(.3,1.4,.5,1);
}
.speedo-hub {
  position: absolute;
  left: 50%; top: 50%;
  width: 1.5cqw; height: 1.5cqw;
  transform: translate(-50%,-50%);
  border-radius: 50%;
  background: #2a3a6a;
}

/* --- 蒸気エフェクト（コンボで強まる）。コックピット上部から --- */
.steam {
  position: absolute;
  left: 0; right: 0;
  top: 66%;
  height: 20%;
  z-index: 2;
  pointer-events: none;
  opacity: calc(0.15 + var(--combo,0) * 0.085);   /* コンボで濃く */
}
.steam span {
  position: absolute;
  bottom: 0;
  width: 6cqw; height: 6cqw;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.85), rgba(255,255,255,0) 70%);
  animation: steamRise 2s ease-in infinite;
  transform: scale(calc(0.5 + var(--combo,0) * 0.06));
}
.steam span:nth-child(2){ animation-duration:1.6s; animation-delay:-0.6s; }
.steam span:nth-child(3){ animation-duration:1.8s; animation-delay:-1.0s; }
.steam span:nth-child(4){ animation-duration:1.5s; animation-delay:-0.3s; }
@keyframes steamRise {
  0%   { opacity:0; transform: translateY(0) scale(.4); }
  30%  { opacity:.9; }
  100% { opacity:0; transform: translateY(-7cqw) scale(1.3); }
}

/* ===========================================================
   宝石コレクション
   =========================================================== */
.gem {
  display: inline-block;
  width: var(--gs, 28px);
  height: var(--gs, 28px);
  background:
    linear-gradient(135deg, rgba(255,255,255,.85), rgba(255,255,255,0) 45%),
    var(--gc, #4d8bff);
  clip-path: polygon(50% 0, 100% 35%, 80% 100%, 20% 100%, 0 35%);
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.4));
}
/* プレイ中の宝石カウンター（左上） */
.gem-hud {
  position: absolute;
  top: 16px;
  left: 16px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(20,12,30,.55);
  color: #fff;
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 900;
  padding: 6px 16px 6px 10px;
  border-radius: 14px;
  box-shadow: 0 4px 0 rgba(0,0,0,.25);
}
.gem-hud.pop { animation: gemPop .3s ease; }
@keyframes gemPop { 0%,100%{transform:scale(1);} 40%{transform:scale(1.25);} }
/* 正解で飛んでくる宝石 */
.fly-gem {
  position: fixed;
  z-index: 60;
  pointer-events: none;
}
/* クリア画面：集めた宝石の一覧 */
.gem-collection {
  position: absolute;
  left: 52%;
  bottom: 22%;
  transform: translateX(-50%);
  display: flex;
  gap: 2.4cqw;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 70%;
  background: rgba(20,12,30,.55);
  border-radius: 2cqw;
  padding: 1.2cqw 2.6cqw;
  z-index: 2;
}
.gem-item {
  display: flex;
  align-items: center;
  gap: 0.7cqw;
  color: #fff;
  font-weight: 900;
  font-size: 3.2cqw;
  text-shadow: 0 2px 3px rgba(0,0,0,.5);
}

/* ===========================================================
   障害物・破壊演出
   =========================================================== */
/* 正解：ドカン！と爆破して進む */
.blast {
  position: absolute;
  left: 50%; top: 47%;
  transform: translate(-50%, -50%);
  z-index: 6;
  pointer-events: none;
}
.blast-core {
  position: absolute; left: 0; top: 0;
  width: 9cqw; height: 9cqw; margin: -4.5cqw 0 0 -4.5cqw;
  border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, #ffe14d 28%, #ff8a1a 52%, rgba(255,80,0,0) 72%);
  transform: scale(.2); opacity: 0;
  animation: blastCore .5s ease-out forwards;
}
@keyframes blastCore {
  0%   { transform: scale(.2); opacity: 1; }
  70%  { opacity: 1; }
  100% { transform: scale(2.8); opacity: 0; }
}
/* 飛び散る破片 */
.blast-spark {
  position: absolute; left: 0; top: 0;
  width: 1.4cqw; height: 1.4cqw; margin: -0.7cqw;
  border-radius: 30%;
  background: #ffce4d;
  transform: rotate(var(--sa)) translateY(0);
  animation: blastSpark .55s ease-out forwards;
}
@keyframes blastSpark {
  0%   { transform: rotate(var(--sa)) translateY(0) scale(1); opacity: 1; }
  100% { transform: rotate(var(--sa)) translateY(-10cqw) scale(.2); opacity: 0; }
}
.boom-text {
  position: absolute; left: 0; top: 0;
  transform: translate(-50%,-50%) scale(0) rotate(-8deg);
  font-size: 8cqw; font-weight: 900; color: #fff;
  -webkit-text-stroke: 0.5cqw #d8402f;
  text-shadow: 0 0.5cqw 0 #a8331f;
  white-space: nowrap;
  animation: boomPop .6s cubic-bezier(.2,1.6,.4,1) forwards;
}
@keyframes boomPop {
  0%   { transform: translate(-50%,-50%) scale(0) rotate(-8deg); opacity: 1; }
  45%  { transform: translate(-50%,-50%) scale(1.18) rotate(5deg); opacity: 1; }
  75%  { transform: translate(-50%,-50%) scale(1) rotate(-2deg); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(1.05) rotate(0); opacity: 0; }
}
/* 不正解：線路に岩が出て激突 */
.rocks {
  position: absolute;
  left: 50%; top: 44%;
  z-index: 6;
  font-size: 9cqw;
  pointer-events: none;
  transform: translate(-50%,-50%) scale(.3);
  filter: drop-shadow(0 0.4cqw 0.6cqw rgba(0,0,0,.55));
  animation: rockHit .55s ease-in forwards;
}
@keyframes rockHit {
  0%   { transform: translate(-50%,-50%) scale(.3); opacity: 0; }
  25%  { opacity: 1; }
  100% { transform: translate(-50%,-28%) scale(1.9); opacity: 1; }
}

/* 3D空間のコンテナ */
.world {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
  z-index: 1;
}

/* --- 線路（地面）：奥から手前へ流れるストライプ --- */
.ground {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 1600px;
  height: 2400px;
  margin-left: -800px;
  transform-origin: 50% 100%;
  transform: rotateX(78deg) translateZ(0);
  background:
    /* 枕木（横線）：これがスクロールして疾走感を出す */
    repeating-linear-gradient(180deg,
      rgba(80,52,28,0)    0px,
      rgba(80,52,28,0)    70px,
      rgba(86,56,30,.85)  70px,
      rgba(86,56,30,.85)  100px),
    /* 砂地のベース（渓谷の地面） */
    linear-gradient(180deg, #d8b075 0%, #b07f42 55%, #7a5128 100%);
  animation: groundScroll 0.6s linear infinite;
}
@keyframes groundScroll {
  from { background-position-y: 0px, 0px; }
  to   { background-position-y: 100px, 0px; } /* 枕木1ピッチ分流す */
}

/* 2本のレール（中央に伸びる） */
.rail {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 14px;
  height: 2400px;
  transform-origin: 50% 100%;
  background: linear-gradient(90deg, #b9c4cc, #6e7d87, #b9c4cc);
  box-shadow: 0 0 6px rgba(255,255,255,.3);
}
.rail.left  { transform: rotateX(78deg) translateX(-90px); }
.rail.right { transform: rotateX(78deg) translateX(76px); }

/* 速度感を出すための流れる横スピード線 */
.speedlines {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle at 50% 42%, transparent 30%, rgba(0,0,0,.0) 31%);
}
.speedlines::before {
  content: "";
  position: absolute;
  left: 50%; top: 42%;
  width: 4px; height: 4px;
  box-shadow:
    -200px 80px 0 1px rgba(255,255,255,.25),
     220px 120px 0 1px rgba(255,255,255,.25),
    -320px 200px 0 2px rgba(255,255,255,.2),
     360px 240px 0 2px rgba(255,255,255,.2);
  animation: zoom 0.6s linear infinite;
}
@keyframes zoom {
  from { transform: scale(.4); opacity: .2; }
  to   { transform: scale(2.6); opacity: 0; }
}

/* --- 分岐の看板（左右の選択肢）：奥から手前へ迫ってくる --- */
.choices {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  pointer-events: none;
  z-index: 5;   /* ムードの上・コックピットより奥 */
}
.choice {
  position: absolute;
  top: 20%;
  width: 17cqw;
  height: 17cqw;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9cqw;
  font-weight: 900;
  color: #fff;
  border-radius: 2cqw;
  border: 0.7cqw solid #fff;
  box-shadow: 0 1cqw 3cqw rgba(0,0,0,.5);
  /* 奥（小さく）から手前（大きく）へ迫る */
  animation: approach 2.6s linear forwards;
}
.choice.left  { left: 23%;  background: #2f7ed8; }
.choice.right { right: 23%; background: #d8482f; }
/* ボスステージでは看板を下げて、ボスと重ならないようにする */
#playScreen.boss-active .choice { top: 30%; }

@keyframes approach {
  0%   { transform: translateY(-4cqw) scale(0.18); opacity: 0; }
  15%  { opacity: 1; }
  100% { transform: translateY(6cqw) scale(1.25); opacity: 1; }
}

/* --- 渓谷の岩壁（左右から迫る峡谷）。上は空が見えるギザギザの稜線 --- */
.cliff {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 52%;
  z-index: 2;
  background:
    linear-gradient(180deg, #c79a64 0%, #a9784a 38%, #7c5230 72%, #553820 100%);
}
/* 中央（線路）に向かって低くなり、上には空が広がる岩肌シルエット */
.cliff.left {
  left: 0;
  clip-path: polygon(
    0% 100%, 0% 34%, 8% 22%, 15% 31%, 23% 16%, 31% 28%,
    40% 21%, 49% 36%, 60% 52%, 72% 72%, 84% 90%, 70% 100%);
}
.cliff.right {
  right: 0;
  transform: scaleX(-1); /* 左右反転で対称に */
  clip-path: polygon(
    0% 100%, 0% 34%, 8% 22%, 15% 31%, 23% 16%, 31% 28%,
    40% 21%, 49% 36%, 60% 52%, 72% 72%, 84% 90%, 70% 100%);
}
/* 岩肌の陰影（斜めの地層）と、谷側の影 */
.cliff::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(-12deg,
      rgba(0,0,0,0) 0 26px, rgba(70,42,18,.14) 26px 34px);
}
.cliff.left::after, .cliff.right::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 55%, rgba(40,24,10,.45) 100%);
}

/* --- 一人称視点のコックピット（ダッシュボード＋手）：手前に固定 --- */
.cockpit {
  --ckx: -48%;                 /* 横位置：PLAYER1ラベル/手の中心(≈0.48)を画面中央に */
  position: absolute;
  left: 50%;
  bottom: -2px;
  transform: translateX(var(--ckx));
  width: 132%;                 /* 少し画面より広げて迫力を出す */
  max-width: 1700px;
  height: auto;
  z-index: 7;                  /* 線路や看板より手前、HUDより奥 */
  pointer-events: none;
  filter: drop-shadow(0 -8px 16px rgba(0,0,0,.4));
}
/* 走行中の細かな上下振動 */
#playScreen.active .cockpit { animation: cockpitShake 0.5s ease-in-out infinite; }
@keyframes cockpitShake {
  0%,100% { transform: translateX(var(--ckx)) translateY(0); }
  50%     { transform: translateX(var(--ckx)) translateY(-4px); }
}

/* ===========================================================
   HUD（問題・スコア）
   =========================================================== */
.hud {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 10;
}
/* 問題＋時間バーを縦に積むコンテナ（重なり防止） */
.top-hud {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
/* 問題表示 */
.question {
  background: rgba(255,255,255,.95);
  color: #173a23;
  font-size: clamp(34px, 7vw, 64px);
  font-weight: 900;
  padding: 10px 34px;
  border-radius: 16px;
  box-shadow: 0 6px 0 rgba(0,0,0,.25);
  white-space: nowrap;
}
/* スコア（連続正解数） */
.score {
  position: absolute;
  top: 16px;
  right: 16px;
  background: #ffe14d;
  color: #7a4b00;
  font-size: clamp(18px, 3.5vw, 28px);
  font-weight: 900;
  padding: 8px 18px;
  border-radius: 14px;
  box-shadow: 0 4px 0 rgba(0,0,0,.25);
}
.score .num { font-size: 1.5em; }

/* 制限時間バー（10秒で減っていく） */
.timer-wrap {
  width: min(80vw, 560px);
  height: 18px;
  background: rgba(0,0,0,.4);
  border: 2px solid rgba(255,255,255,.7);
  border-radius: 12px;
  overflow: hidden;
}
.timer-bar {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(90deg, #34c759, #ffe14d);
}
/* 残り時間が少ないと赤く点滅 */
.timer-bar.danger {
  background: linear-gradient(90deg, #ff4d4d, #ff9a3d);
  animation: timerBlink .35s ease-in-out infinite;
}
@keyframes timerBlink { 50% { opacity: .45; } }

/* 「どっち！？」のあおり */
.prompt-go {
  position: absolute;
  bottom: 30%;
  left: 50%;
  transform: translateX(-50%);
  color: #ffe14d;
  font-size: clamp(22px, 4.5vw, 40px);
  font-weight: 900;
  text-shadow: 0 3px 6px rgba(0,0,0,.6);
  animation: blink 0.8s ease-in-out infinite;
}
@keyframes blink { 50% { opacity: .35; } }

/* 左右のタップ領域（画面の左半分・右半分） */
.tap-zones {
  position: absolute;
  inset: 0;
  display: flex;
  z-index: 20;
}
.tap-zone {
  flex: 1;
  cursor: pointer;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 24px;
  font-size: 50px;
  color: rgba(255,255,255,.35);
}
.tap-zone:active { background: rgba(255,255,255,.06); }

/* --- こたえるレバー（左右） --- */
.lever {
  position: relative;
  width: clamp(72px, 9vw, 120px);
  height: clamp(120px, 20vh, 200px);
  margin-bottom: clamp(8px, 2vh, 30px);
  pointer-events: none;   /* タップはゾーンが受ける */
  filter: drop-shadow(0 6px 8px rgba(0,0,0,.45));
  perspective: 600px;     /* 手前に倒す3D表現用 */
}
.lever-base {
  position: absolute;
  bottom: 0; left: 50%;
  width: 78%; height: 16%;
  transform: translateX(-50%);
  background: linear-gradient(#525866, #2a2e36);
  border-radius: 40% / 60%;
  box-shadow: inset 0 3px 4px rgba(255,255,255,.15);
}
.lever-stick {
  position: absolute;
  bottom: 9%; left: 50%;
  width: 17%; height: 82%;
  transform-origin: 50% 100%;
  background: linear-gradient(90deg, #6e7480, #e3e9f0 45%, #6e7480);
  border-radius: 999px;
  transform: translateX(-50%) rotateX(10deg);   /* 基準：少し奥に立つ */
}
.lever-knob {
  position: absolute;
  top: -10%; left: 50%;
  width: 240%; aspect-ratio: 1;
  transform: translateX(-50%);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(20px, 3vw, 36px);
  color: #fff; font-weight: 900;
  box-shadow: inset -5px -6px 10px rgba(0,0,0,.35), inset 4px 4px 8px rgba(255,255,255,.35), 0 4px 8px rgba(0,0,0,.4);
}
.lever.left  .lever-knob { background: radial-gradient(circle at 35% 30%, #6ea8ff, #2f6fd0); }
.lever.right .lever-knob { background: radial-gradient(circle at 35% 30%, #ff8a7a, #d8402f); }

/* ガチャン！と手前に引く演出（rotateXで手前に倒す） */
.lever.pull .lever-stick { animation: leverPull .36s cubic-bezier(.25,1.5,.5,1); }
@keyframes leverPull {
  0%   { transform: translateX(-50%) rotateX(10deg); }
  40%  { transform: translateX(-50%) rotateX(66deg); }   /* グイッと手前へ */
  100% { transform: translateX(-50%) rotateX(10deg); }
}

/* 正解時のキラッ */
.flash-correct {
  position: absolute; inset: 0; z-index: 25;
  background: radial-gradient(circle at 50% 50%, rgba(120,255,150,.5), transparent 60%);
  opacity: 0; pointer-events: none;
}
.flash-correct.show { animation: flashOk .45s ease-out; }
@keyframes flashOk { 0%{opacity:1;} 100%{opacity:0;} }

/* ===========================================================
   背景の禍々しさ（3問ごとにステップアップ）
   渓谷はそのまま、上から色（ムード）を重ねて雰囲気を変える。
   tier-0: さわやかな昼 → tier-3: 紫の魔界
   =========================================================== */
.mood {
  position: absolute;
  inset: 0;
  z-index: 3;            /* 渓谷・線路の上、ボス/看板/コックピットより下 */
  pointer-events: none;
  background: transparent;
  transition: background .6s ease;
}
/* tier-0（1〜3問目）：さわやかな昼。爽やかな空色を薄くのせる */
#playScreen.tier-0 .mood {
  background: linear-gradient(180deg, rgba(150,210,255,.22) 0%, rgba(255,255,255,0) 45%);
}
/* tier-1（4〜6問目）：険しい山道（味付けなし＝そのまま） */
#playScreen.tier-1 .mood { background: transparent; }
/* tier-2（7〜9問目）：急勾配・マグマのような赤 */
#playScreen.tier-2 .mood {
  background: linear-gradient(180deg,
    rgba(120,15,0,.42) 0%, rgba(255,80,10,.30) 45%, rgba(70,0,0,.55) 100%);
  animation: moodPulse 1.8s ease-in-out infinite;
}
/* tier-3（10問目・ラスボス）：紫×マゼンタの魔界。脈打つ */
#playScreen.tier-3 .mood {
  background: radial-gradient(circle at 50% 40%,
              rgba(150,20,160,.45) 0%, rgba(40,5,55,.66) 55%, rgba(10,0,18,.8) 100%);
  animation: moodPulse 1.4s ease-in-out infinite;
}
@keyframes moodPulse {
  0%,100% { opacity: 1; }
  50%     { opacity: .82; }
}

/* ===========================================================
   ラスボス P.O.C. OVERLORD（10問目）
   =========================================================== */
.boss {
  position: absolute;
  top: 8%;
  left: 50%;
  width: min(50%, 300px);
  transform: translateX(-50%) scale(0);
  transform-origin: 50% 60%;
  filter: drop-shadow(0 0 26px rgba(190,50,230,.9));
  z-index: 3;            /* 看板やトロッコより奥 */
  pointer-events: none;
  display: none;
  will-change: transform;
}
/* ボスステージ中だけ表示し、登場→浮遊アニメ */
#playScreen.boss-active .boss {
  display: block;
  animation:
    bossEnter 0.9s cubic-bezier(.2,1.5,.4,1) forwards,
    bossFloat 3s ease-in-out 0.9s infinite;
}
@keyframes bossEnter {
  0%   { transform: translateX(-50%) scale(0) rotate(-25deg); opacity: 0; }
  100% { transform: translateX(-50%) scale(1) rotate(0deg);   opacity: 1; }
}
@keyframes bossFloat {
  0%,100% { transform: translateX(-50%) translateY(0)     rotate(-1.5deg); }
  50%     { transform: translateX(-50%) translateY(-16px) rotate(1.5deg); }
}
/* 撃破演出：光って弾けて消える */
.boss.defeat {
  animation: bossDefeat 1.1s ease-in forwards !important;
}
@keyframes bossDefeat {
  0%   { transform: translateX(-50%) scale(1)    rotate(0deg);  filter: brightness(1) drop-shadow(0 0 26px rgba(190,50,230,.9)); }
  35%  { transform: translateX(-50%) scale(1.12) rotate(10deg); filter: brightness(2.4) drop-shadow(0 0 50px #fff); }
  70%  { transform: translateX(-50%) scale(1.18) rotate(-12deg);filter: brightness(3) drop-shadow(0 0 60px #fff); }
  100% { transform: translateX(-50%) scale(0.1)  rotate(40deg); filter: brightness(4); opacity: 0; }
}

/* ボスの攻撃：闇の弾（スカル）がこちらに迫ってくる */
.boss-fx { position: absolute; inset: 0; z-index: 9; pointer-events: none; overflow: hidden; }
.boss-bolt {
  position: absolute;
  left: 50%;
  top: 40%;                /* ボスが抱える宝珠あたりから発射 */
  width: 64px; height: 64px;
  margin: -32px 0 0 -32px;
  border-radius: 50%;
  background: radial-gradient(circle at 50% 42%,
              #ff8af0 0%, #ff3ad8 32%, #b41ad0 55%, #5a0a8a 78%, transparent 80%);
  box-shadow: 0 0 28px 10px rgba(225,45,210,.85);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px;
  animation: bolt 1s ease-in forwards;
}
.boss-bolt::after { content: "💀"; filter: brightness(0.6) saturate(2); }
@keyframes bolt {
  0%   { transform: translate(0,0) scale(0.2);                 opacity: 0; }
  12%  { opacity: 1; }
  100% { transform: translate(var(--dx,0), 230px) scale(5.5);  opacity: 0; }
}

/* 攻撃の着弾フラッシュ（画面にビシッと当たる感じ） */
.boss-impact {
  position: absolute; inset: 0; z-index: 8; pointer-events: none; opacity: 0;
  background: radial-gradient(circle at 50% 58%, rgba(255,70,225,.55), transparent 62%);
}
.boss-impact.show { animation: impactFlash .26s ease-out; }
@keyframes impactFlash { 0% { opacity: 1; } 100% { opacity: 0; } }

/* ===========================================================
   不正解：落下＆暗転アニメーション
   =========================================================== */
#playScreen.crash {
  animation: shake 0.5s, fadeBlack 1.2s 0.5s forwards;
}
/* 脱線時はコックピットを大きく揺らす */
#playScreen.crash .cockpit { animation: cockpitCrash 0.5s ease-in-out; }
@keyframes shake {
  0%,100% { transform: translate(0,0); }
  20% { transform: translate(-12px, 6px) rotate(-2deg); }
  40% { transform: translate(12px, -6px) rotate(2deg); }
  60% { transform: translate(-10px, 8px) rotate(-1deg); }
  80% { transform: translate(10px, -4px) rotate(1deg); }
}
@keyframes cockpitCrash {
  0%   { transform: translateX(var(--ckx)) translateY(0) rotate(0); }
  30%  { transform: translateX(var(--ckx)) translateY(14px) rotate(-3deg); }
  60%  { transform: translateX(var(--ckx)) translateY(8px) rotate(3deg); }
  100% { transform: translateX(var(--ckx)) translateY(20px) rotate(0); }
}
@keyframes fadeBlack {
  from { filter: brightness(1); }
  to   { filter: brightness(0); }
}

/* ===========================================================
   ゲームオーバー画面
   =========================================================== */
#overScreen {
  background: linear-gradient(180deg, #2a0f12 0%, #561d22 100%);
  color: #fff;
  text-align: center;
  z-index: 40;
}
.over-title {
  font-size: clamp(40px, 9vw, 90px);
  font-weight: 900;
  color: #ff6b5e;
  text-shadow: 0 4px 0 #7a2018;
  margin-bottom: 10px;
}
.over-cart { font-size: clamp(70px, 14vw, 140px); margin-bottom: 10px; animation: bob 1.2s ease-in-out infinite; }
.result {
  font-size: clamp(22px, 4.5vw, 38px);
  font-weight: 700;
  margin-bottom: 6px;
}
.result .big {
  display: inline-block;
  font-size: 1.8em;
  font-weight: 900;
  color: #ffe14d;
  margin: 0 6px;
}
.over-correct {
  font-size: clamp(18px, 3.5vw, 26px);
  background: rgba(255,255,255,.12);
  padding: 8px 20px;
  border-radius: 12px;
  margin: 14px 0 36px;
}
.over-correct b { color: #9be79b; }

/* ===========================================================
   クリア画面（1枚イラスト＋オーバーレイ）
   =========================================================== */
#clearScreen { z-index: 40; background: #cfe6f2; }

/* イラストと同じ比率の舞台。中にイラストを敷き、％でオーバーレイ位置を合わせる */
.clear-stage {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: min(100%, calc(100vh * 3054 / 1376));
  aspect-ratio: 3054 / 1376;
  z-index: 1;
  container-type: size;   /* 中の文字をイラストの縮尺(cqw)に合わせる */
}
.clear-img { display: block; width: 100%; height: 100%; }

/* イラストの「最終スコア／クリアした計算」を隠してタイムを出す板 */
.clear-time-overlay {
  position: absolute;
  left: 52%;
  top: 38%;
  transform: translate(-50%, -50%);
  width: 21%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.4cqw;
  background: #f3e2c0;                 /* 木の看板っぽいクリーム色で確実に隠す */
  border: 0.3cqw solid #8a5a2b;
  border-radius: 1.4cqw;
  padding: 1.4cqw 1.6cqw;
  box-shadow: 0 0.3cqw 0 #6e4520, inset 0 0 0 0.2cqw rgba(255,255,255,.4);
}
.ct-label {
  font-size: 2.3cqw;
  font-weight: 800;
  color: #8a4b18;
  letter-spacing: 1px;
}
.ct-value {
  font-size: 5cqw;
  font-weight: 900;
  color: #1c6b8a;
  line-height: 1;
  white-space: nowrap;
}
.ct-unit { font-size: 0.42em; font-weight: 800; color: #5e3d22; margin-left: 0.4cqw; }

/* イラストのボタンに重ねる、実際に押せるボタン */
.clear-btn {
  position: absolute;
  bottom: 6%;
  width: 19%;
  height: 13%;
  border: none;
  border-radius: 999px;
  font-family: inherit;
  font-weight: 900;
  color: #fff;
  font-size: 2.7cqw;
  cursor: pointer;
  box-shadow: 0 0.4cqw 0 rgba(0,0,0,.3);
  transition: transform .08s, box-shadow .08s;
}
.clear-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,.3); }
.clear-btn.home  { left: 29%; background: linear-gradient(180deg,#ff7a8a,#e8455f); }
.clear-btn.retry { left: 50%; background: linear-gradient(180deg,#46c6e6,#2a8fc4); }

/* ===========================================================
   ゲームオーバー画面（1枚イラスト＋オーバーレイ）
   =========================================================== */
#overScreen { z-index: 40; background: #2b2f3a; }
/* イラストの「今回のスコア／正解数」を隠して、正解の答えを出す石板 */
.over-answer-overlay {
  position: absolute;
  left: 53.4%;
  top: 39%;
  transform: translate(-50%, -50%);
  width: 27%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.3cqw;
  background: linear-gradient(180deg, #9a9ca6, #6c6e78);  /* 石板っぽいグレー */
  border: 0.3cqw solid #3c3d44;
  border-radius: 1.4cqw;
  padding: 1.2cqw 1.6cqw;
  box-shadow: 0 0.3cqw 0 #3c3d44, inset 0 0 0 0.2cqw rgba(255,255,255,.25);
}
.oa-label {
  font-size: 2.3cqw;
  font-weight: 800;
  color: #ffe14d;
  letter-spacing: 1px;
  text-shadow: 0 1px 2px rgba(0,0,0,.5);
}
.oa-eq {
  font-size: 4.4cqw;
  font-weight: 900;
  color: #fff;
  line-height: 1;
  white-space: nowrap;
  text-shadow: 0 2px 3px rgba(0,0,0,.55);
}
/* ゲームオーバーのボタンは元イラストの位置に合わせる */
#overScreen .clear-btn { bottom: 5%; }
#overScreen .clear-btn.home  { left: 32%; }
#overScreen .clear-btn.retry { left: 50.5%; }
</style>
</head>
<body>
<div id="game">

  <!-- ============ タイトル画面（表紙＝1枚イラスト） ============ -->
  <section id="titleScreen" class="screen active">
    <!-- 余白を埋める、ぼかした背景 -->
    <img class="cover-bg" src="cover.png" alt="" aria-hidden="true">
    <!-- 表紙イラスト全体（タイトルを切らさず表示） -->
    <img class="cover-img" src="cover.png" alt="ひきざんトロッコ 算数大冒険">
    <button class="big-btn cover-start" id="startBtn">スタート</button>
  </section>

  <!-- ============ プレイ画面 ============ -->
  <section id="playScreen" class="screen">
    <!-- 余白を埋める、ぼかした背景 -->
    <img class="cover-bg" src="scene.png" alt="" aria-hidden="true">

    <!-- 画像と同じ比率の舞台（オーバーレイ位置を正確に合わせる） -->
    <div class="play-stage">
      <!-- コックピット＋山道のメイン画像 -->
      <img class="scene-img" src="scene.png" alt="">

      <!-- スピード線（集中線）：奥から手前へ流れる。コンボで加速 -->
      <div class="speedlines" id="speedlines" aria-hidden="true"></div>

      <!-- 禍々しさのムード（ボスステージで紫に） -->
      <div class="mood"></div>

      <!-- 奥から迫ってくる左右の選択肢看板 -->
      <div class="choices" id="choices"></div>

      <!-- ラスボス：P.O.C. OVERLORD（10問目だけ登場） -->
      <img class="boss" id="boss" src="boss.png" alt="P.O.C. OVERLORD">
      <div class="boss-fx" id="bossFx"></div>
      <div class="boss-impact" id="bossImpact"></div>

      <!-- 速度計（コンボで針が右に動く） -->
      <div class="speedo">
        <div class="speedo-face"></div>
        <div class="speedo-needle" id="speedoNeedle"></div>
        <div class="speedo-hub"></div>
      </div>

      <!-- 蒸気エフェクト（コンボで強まる） -->
      <div class="steam" id="steam">
        <span style="left:14%"></span><span style="left:30%"></span>
        <span style="left:70%"></span><span style="left:86%"></span>
      </div>
    </div>


    <!-- HUD -->
    <div class="hud">
      <!-- 問題と制限時間バーを縦に積む（重ならないように） -->
      <div class="top-hud">
        <div class="question" id="question">18 - 5 = ?</div>
        <div class="timer-wrap">
          <div class="timer-bar" id="timerBar"></div>
        </div>
      </div>
      <div class="score">もんだい <span class="num" id="stageNum">1</span>/10</div>
      <!-- 集めた宝石カウンター -->
      <div class="gem-hud">
        <span class="gem" style="--gc:#4d8bff; --gs:26px"></span>
        <span id="gemCount">0</span>
      </div>
      <div class="prompt-go" id="promptGo">どっちに すすむ？</div>
    </div>

    <!-- 左右タップ領域 -->
    <div class="tap-zones">
      <div class="tap-zone" id="zoneLeft">
        <div class="lever left" id="leverLeft">
          <div class="lever-base"></div>
          <div class="lever-stick"><div class="lever-knob">◀</div></div>
        </div>
      </div>
      <div class="tap-zone" id="zoneRight">
        <div class="lever right" id="leverRight">
          <div class="lever-base"></div>
          <div class="lever-stick"><div class="lever-knob">▶</div></div>
        </div>
      </div>
    </div>

    <div class="flash-correct" id="flash"></div>
  </section>

  <!-- ============ ゲームオーバー画面＝1枚イラスト ============ -->
  <section id="overScreen" class="screen">
    <!-- 余白を埋める、ぼかした背景 -->
    <img class="cover-bg" src="gameover.png" alt="" aria-hidden="true">
    <!-- イラストと同じ比率の舞台 -->
    <div class="clear-stage">
      <img class="clear-img" src="gameover.png" alt="ゲームオーバー">
      <!-- イラストの「今回のスコア／正解数」を隠して、正解の答えを表示 -->
      <div class="over-answer-overlay">
        <span class="oa-label" id="overLabel">せいかいは</span>
        <span class="oa-eq" id="overCorrect">53 − 26 = 27</span>
      </div>
      <!-- 実際に押せるボタン（イラストのボタンに重ねる） -->
      <button class="clear-btn home"  id="overHomeBtn">表紙へ戻る</button>
      <button class="clear-btn retry" id="retryBtn">もう一度遊ぶ</button>
    </div>
  </section>

  <!-- ============ クリア（ぜんもんとっぱ）画面＝1枚イラスト ============ -->
  <section id="clearScreen" class="screen">
    <!-- 余白を埋める、ぼかした背景 -->
    <img class="cover-bg" src="clear.png" alt="" aria-hidden="true">
    <!-- イラストと同じ比率の舞台（オーバーレイ位置を正確に合わせるため） -->
    <div class="clear-stage">
      <img class="clear-img" src="clear.png" alt="算数大冒険クリア！">
      <!-- イラストの「最終スコア／クリアした計算」を隠して、クリアタイムを表示 -->
      <div class="clear-time-overlay">
        <span class="ct-label">クリアタイム</span>
        <span class="ct-value"><span id="clearTime">0.0</span><span class="ct-unit">びょう</span></span>
      </div>
      <!-- 集めた宝石の種類と数 -->
      <div class="gem-collection" id="clearGems"></div>
      <!-- 実際に押せるボタン（イラストのボタンに重ねる） -->
      <button class="clear-btn home"  id="clearHomeBtn">表紙へ戻る</button>
      <button class="clear-btn retry" id="clearRetryBtn">もう一度遊ぶ</button>
    </div>
  </section>

</div>

<script>
/* ===========================================================
   画面切り替えユーティリティ
   =========================================================== */
const screens = {
  title: document.getElementById('titleScreen'),
  play:  document.getElementById('playScreen'),
  over:  document.getElementById('overScreen'),
  clear: document.getElementById('clearScreen'),
};
function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

/* ===========================================================
   ゲーム状態
   =========================================================== */
const TOTAL_STAGES = 10;      // 全10問のステージ式
const TIME_LIMIT   = 10000;   // 1問あたりの制限時間（10秒）

let stage = 1;          // 現在の問題番号（1〜10）
let score = 0;          // 正解数
let current = null;     // 現在の問題 { a, b, answer, leftVal, rightVal, correctSide }
let locked = false;     // 演出中の入力ロック
let timerId = null;     // 制限時間タイマー
let dangerId = null;    // 残り時間わずかの警告タイマー

/* タイム計測：各問の「出題〜解答」にかかった時間を裏で合計する */
let totalTimeMs = 0;    // クリアまでの合計タイム（ミリ秒）
let qStartAt = 0;       // 現在の問題が表示された時刻

/* 宝石コレクション */
const GEMS = [
  { key:'ruby',     color:'#ff4d6d' },
  { key:'sapphire', color:'#4d8bff' },
  { key:'emerald',  color:'#36d98a' },
  { key:'topaz',    color:'#ffc02e' },
  { key:'amethyst', color:'#b15dff' },
];
let gemCounts = {};     // 種類ごとの獲得数
let gemTotal = 0;       // 合計獲得数

const elQuestion  = document.getElementById('question');
const elStageNum  = document.getElementById('stageNum');
const elChoices   = document.getElementById('choices');
const elFlash     = document.getElementById('flash');
const elPlay      = document.getElementById('playScreen');
const elTimerBar  = document.getElementById('timerBar');
const elBoss      = document.getElementById('boss');
const elBossFx    = document.getElementById('bossFx');
const elBossImpact= document.getElementById('bossImpact');
const elLeverLeft = document.getElementById('leverLeft');
const elLeverRight= document.getElementById('leverRight');

let bossAttackId = null; // ボスの連続攻撃タイマー

/* ===========================================================
   効果音（Web Audioで「ガチャン！」を合成）
   =========================================================== */
let audioCtx = null;
function initAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) { /* 非対応でも無音で続行 */ }
}
function playClunk() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  // 低い「ゴトッ」（金属の手応え）
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(55, t + 0.12);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.35, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
  o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t + 0.22);
  // 金属的な「カチッ」（ノイズ）
  const len = Math.floor(audioCtx.sampleRate * 0.05);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
  const n = audioCtx.createBufferSource(); n.buffer = buf;
  const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1800;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(0.3, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.06);
  n.connect(hp).connect(ng).connect(audioCtx.destination); n.start(t); n.stop(t + 0.06);
}
/* レバーを引く演出＋ガチャン音 */
function pullLever(side) {
  const lev = (side === 'left') ? elLeverLeft : elLeverRight;
  if (lev) { lev.classList.remove('pull'); void lev.offsetWidth; lev.classList.add('pull'); }
  playClunk();
}

/* 爆発音（ドカン！）。strong=trueでより重いクラッシュ音 */
function playBoom(strong) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(strong ? 100 : 130, t);
  o.frequency.exponentialRampToValueAtTime(strong ? 32 : 45, t + (strong ? 0.45 : 0.33));
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(strong ? 0.6 : 0.45, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + (strong ? 0.5 : 0.38));
  o.connect(g).connect(audioCtx.destination); o.start(t); o.stop(t + (strong ? 0.52 : 0.4));
  // 破片ノイズ
  const dur = strong ? 0.4 : 0.3;
  const len = Math.floor(audioCtx.sampleRate * dur);
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.4);
  const n = audioCtx.createBufferSource(); n.buffer = buf;
  const lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(2200, t); lp.frequency.exponentialRampToValueAtTime(300, t + dur);
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(strong ? 0.6 : 0.45, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  n.connect(lp).connect(ng).connect(audioCtx.destination); n.start(t); n.stop(t + dur);
}

/* 正解：線路の岩を大砲でドカン！と破壊して進む */
function blastObstacle() {
  const stage = document.querySelector('.play-stage');
  if (!stage) return;
  const b = document.createElement('div');
  b.className = 'blast';
  let sparks = '';
  for (let i = 0; i < 8; i++) sparks += `<div class="blast-spark" style="--sa:${i * 45}deg"></div>`;
  b.innerHTML = `<div class="blast-core"></div>${sparks}<div class="boom-text">ドカン！</div>`;
  stage.appendChild(b);
  setTimeout(() => b.remove(), 700);
  playBoom(false);
}

/* 不正解：線路に岩が出現して激突 */
function showRocks() {
  const stage = document.querySelector('.play-stage');
  if (!stage) return;
  const r = document.createElement('div');
  r.className = 'rocks';
  r.textContent = '🪨🪨🪨';
  stage.appendChild(r);
  setTimeout(() => r.remove(), 1500);
  playBoom(true);
}

/* ===========================================================
   問題生成ロジック（ステージ式の難易度カーブ）
    1〜3問目 : 2桁(10〜20) − 1桁、繰り下がり なし（やさしい）
    4〜6問目 : 2桁(10〜20) − 1桁、繰り下がり ありなし混合
    7〜9問目 : 2桁(10〜20) − 1桁、繰り下がり あり（むずかしい）
    10問目   : 2桁 − 2桁、繰り下がり あり（ラスボス）
   =========================================================== */
function makeProblem(stage) {
  let a, b;

  if (stage >= TOTAL_STAGES) {
    // --- ラスボス：2桁 − 2桁（繰り下がりあり） ---
    for (let t = 0; t < 300; t++) {
      a = randInt(21, 99);
      b = randInt(11, a - 1);
      if ((a % 10) < (b % 10)) break; // 一の位で繰り下がりが発生する組み合わせ
    }
  } else {
    // --- 2桁(10〜20) − 1桁 ---
    let wantBorrow;
    if (stage <= 3)      wantBorrow = false;               // 繰り下がりなし
    else if (stage <= 6) wantBorrow = Math.random() < 0.5; // まざる
    else                 wantBorrow = true;                // 繰り下がりあり

    for (let t = 0; t < 300; t++) {
      a = randInt(11, 20);          // 2桁は20まで
      b = randInt(2, 9);            // 1桁
      if (b >= a) continue;
      const borrow = (a % 10) < b;  // aの一の位より引く数が大きい＝繰り下がり
      if (borrow === wantBorrow) break;
    }
  }
  const answer = a - b;

  // --- ダミー（おてつき）選択肢を生成 ---
  const dummy = makeDummy(a, b, answer);

  // 正解とダミーを左右ランダムに配置
  const correctSide = Math.random() < 0.5 ? 'left' : 'right';
  const leftVal  = correctSide === 'left'  ? answer : dummy;
  const rightVal = correctSide === 'right' ? answer : dummy;

  return { a, b, answer, leftVal, rightVal, correctSide };
}

/* 小2が陥りやすいミスを意図的にダミーにする */
function makeDummy(a, b, answer) {
  const candidates = [];
  const aOnes = a % 10, aTens = Math.floor(a / 10);
  const bOnes = b % 10, bTens = Math.floor(b / 10);

  // ミス1: 一の位を「大きい方-小さい方」で引いてしまう（繰り下がり無視）
  //   例) 52-18 → 一の位 8-2=6、十の位 5-1=4 → 46
  if (aOnes < bOnes) {
    const wrongOnes = bOnes - aOnes;
    const wrongTens = aTens - bTens; // 繰り下げないのでそのまま
    if (wrongTens >= 0) candidates.push(wrongTens * 10 + wrongOnes);
  }

  // ミス2: 繰り下がりを忘れる（一の位は正しく10を借りるが十の位を減らし忘れ）
  //   例) 52-18 → 一の位 12-8=4、十の位 5-1=4のはずが 5-1を忘れ… ここでは +10 のズレ
  candidates.push(answer + 10);

  // ミス3: 一の位だけ＋1/−1のうっかり（計算ミス）
  candidates.push(answer + 1);
  candidates.push(answer - 1);

  // 正解と同じ・負・100以上を除外し、重複も除く
  const valid = [...new Set(candidates)].filter(v => v !== answer && v > 0 && v < 100);

  if (valid.length > 0) {
    return valid[randInt(0, valid.length - 1)];
  }
  // 念のためのフォールバック（近い数字）
  let d;
  do { d = answer + randInt(-9, 9); } while (d === answer || d <= 0 || d >= 100);
  return d;
}

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

/* ===========================================================
   背景の禍々しさ（3問ごとに段階アップ）
   =========================================================== */
function setTier(stage) {
  let tier;
  if (stage <= 3)      tier = 0; // さわやかな昼
  else if (stage <= 6) tier = 1; // 夕暮れ
  else if (stage <= 9) tier = 2; // 夜の毒気
  else                 tier = 3; // 地獄（ラスボス）
  elPlay.classList.remove('tier-0', 'tier-1', 'tier-2', 'tier-3');
  elPlay.classList.add('tier-' + tier);
}

/* ===========================================================
   ラスボス P.O.C. OVERLORD の制御
   =========================================================== */
function startBoss() {
  elBoss.classList.remove('defeat');
  elBoss.style.display = '';        // CSS側の表示制御に戻す
  elPlay.classList.add('boss-active');
  // 周期的に闇の弾をこちらへ撃ってくる
  clearInterval(bossAttackId);
  bossAttackId = setInterval(spawnBolt, 850);
  setTimeout(spawnBolt, 1000);      // 登場直後に最初の一撃
}
function stopBoss() {
  elPlay.classList.remove('boss-active');
  elBoss.classList.remove('defeat');
  clearInterval(bossAttackId);
  bossAttackId = null;
  elBossFx.innerHTML = '';
}
/* 闇の弾を1発生成して、こちらに迫らせる */
function spawnBolt() {
  const bolt = document.createElement('div');
  bolt.className = 'boss-bolt';
  bolt.style.setProperty('--dx', (Math.random() * 2 - 1) * 170 + 'px'); // 左右にばらつき
  elBossFx.appendChild(bolt);
  // 着弾の瞬間に画面をフラッシュ
  setTimeout(() => {
    elBossImpact.classList.add('show');
    setTimeout(() => elBossImpact.classList.remove('show'), 260);
  }, 850);
  setTimeout(() => bolt.remove(), 1050);
}
/* 正解でボスを撃破 */
function defeatBoss() {
  clearInterval(bossAttackId);
  bossAttackId = null;
  elBossFx.innerHTML = '';
  elBoss.classList.add('defeat');
  elFlash.classList.add('show'); // 白フラッシュ
  setTimeout(() => elFlash.classList.remove('show'), 600);
}

/* ===========================================================
   制限時間タイマー（10秒）
   =========================================================== */
function startTimer() {
  clearTimers();
  qStartAt = performance.now();   // この問題の計測開始
  elTimerBar.classList.remove('danger');
  // バーをいったん満タンに戻してから10秒かけて減らす
  elTimerBar.style.transition = 'none';
  elTimerBar.style.width = '100%';
  void elTimerBar.offsetWidth; // 再描画を強制してアニメをやり直す
  elTimerBar.style.transition = `width ${TIME_LIMIT}ms linear`;
  elTimerBar.style.width = '0%';

  // 残り3秒で赤く点滅させて警告
  dangerId = setTimeout(() => elTimerBar.classList.add('danger'), TIME_LIMIT - 3000);
  // 時間切れ → ゲームオーバー
  timerId = setTimeout(() => {
    if (locked) return;
    locked = true;
    gameOver('timeup');
  }, TIME_LIMIT);
}
function clearTimers() {
  clearTimeout(timerId);
  clearTimeout(dangerId);
}

/* ===========================================================
   問題の表示
   =========================================================== */
function nextProblem() {
  current = makeProblem(stage);
  locked = false;

  elStageNum.textContent = stage;
  elQuestion.textContent = `${current.a} - ${current.b} = ?`;
  setTier(stage); // 背景の禍々しさを更新

  // 10問目だけラスボス登場、それ以外は退場
  if (stage >= TOTAL_STAGES) startBoss();
  else stopBoss();

  // 看板を作り直す（approachアニメをやり直すため）
  elChoices.innerHTML = '';
  const left  = document.createElement('div');
  left.className = 'choice left';
  left.textContent = current.leftVal;
  const right = document.createElement('div');
  right.className = 'choice right';
  right.textContent = current.rightVal;
  elChoices.appendChild(left);
  elChoices.appendChild(right);

  startTimer(); // 制限時間スタート
}

/* ===========================================================
   選択処理
   =========================================================== */
function choose(side) {
  if (locked || !current) return;
  locked = true;
  clearTimers();
  pullLever(side);   // レバーをガチャン！と引く

  if (side === current.correctSide) {
    // --- 正解 ---
    totalTimeMs += performance.now() - qStartAt; // この問にかかった時間を合計に加える
    score++;
    elPlay.style.setProperty('--combo', Math.min(score, 10)); // 速度計の針＆蒸気を強める
    collectGem();                                             // 宝石を1つ集める
    blastObstacle();                                          // 岩を大砲でドカン！と破壊
    elFlash.classList.add('show');
    setTimeout(() => elFlash.classList.remove('show'), 450);

    if (stage >= TOTAL_STAGES) {
      // 10問すべてクリア！ ボスを撃破してからクリア画面へ
      defeatBoss();
      setTimeout(winGame, 1200);
    } else {
      stage++;
      setTimeout(nextProblem, 350); // シームレスに次の問題へ
    }
  } else {
    // --- 不正解：落下＆暗転 → ゲームオーバー ---
    gameOver('wrong');
  }
}

/* 失敗（不正解 or 時間切れ）→ 落下演出 → ゲームオーバー画面 */
function gameOver(reason) {
  clearTimers();
  clearInterval(bossAttackId); // ボスの攻撃を止める
  bossAttackId = null;
  elTimerBar.style.transition = 'none'; // タイマーバーを止める
  showRocks();                 // 線路に岩が出て激突（減速）
  elPlay.classList.add('crash');
  setTimeout(() => {
    elPlay.classList.remove('crash');
    // 石板に「正解の答え」を表示（学習のふりかえり）
    document.getElementById('overLabel').textContent =
      (reason === 'timeup') ? 'じかんぎれ！ せいかいは' : 'せいかいは';
    document.getElementById('overCorrect').textContent =
      `${current.a} − ${current.b} = ${current.answer}`;
    showScreen('over');
  }, 1700); // shake(0.5s) + fadeBlack(1.2s)
}

/* 合計タイム（ミリ秒）を「12.3」や「1ぷん 5.3」の形に整える */
function formatTime(ms) {
  const sec = ms / 1000;
  if (sec >= 60) {
    const m = Math.floor(sec / 60);
    const s = (sec - m * 60).toFixed(1);
    return `${m}ぷん ${s}`;
  }
  return sec.toFixed(1);
}

/* ===========================================================
   宝石コレクション
   =========================================================== */
/* 正解時：線路の宝石が1つ飛んできてカウンターに集まる */
function collectGem() {
  const gem = GEMS[Math.floor(Math.random() * GEMS.length)];
  const el = document.createElement('div');
  el.className = 'gem fly-gem';
  el.style.setProperty('--gc', gem.color);
  el.style.setProperty('--gs', '42px');
  document.body.appendChild(el);
  const t = document.getElementById('gemCount').getBoundingClientRect();
  const tx = t.left + t.width / 2, ty = t.top + t.height / 2;
  const sx = window.innerWidth * 0.5, sy = window.innerHeight * 0.45;
  el.style.left = (sx - 21) + 'px';
  el.style.top  = (sy - 21) + 'px';
  const anim = el.animate([
    { transform: 'translate(0,0) scale(1.6) rotate(0deg)', opacity: 0 },
    { transform: 'translate(0,0) scale(1.6) rotate(0deg)', opacity: 1, offset: .18 },
    { transform: `translate(${tx - sx}px, ${ty - sy}px) scale(.5) rotate(280deg)`, opacity: .95 }
  ], { duration: 700, easing: 'cubic-bezier(.5,0,.6,1)' });
  anim.onfinish = () => { el.remove(); registerGem(gem); };
}
/* 獲得を記録してカウンター更新 */
function registerGem(gem) {
  gemCounts[gem.key] = (gemCounts[gem.key] || 0) + 1;
  gemTotal++;
  document.getElementById('gemCount').textContent = gemTotal;
  const hud = document.querySelector('.gem-hud');
  hud.classList.remove('pop'); void hud.offsetWidth; hud.classList.add('pop');
}
/* クリア画面：集めた宝石の種類と数を表示 */
function renderGemCollection() {
  const wrap = document.getElementById('clearGems');
  wrap.innerHTML = '';
  GEMS.forEach(g => {
    if (gemCounts[g.key]) {
      const item = document.createElement('div');
      item.className = 'gem-item';
      item.innerHTML = `<span class="gem" style="--gc:${g.color}; --gs:3.4cqw"></span>×${gemCounts[g.key]}`;
      wrap.appendChild(item);
    }
  });
}

/* 全問クリア */
function winGame() {
  clearTimers();
  stopBoss();
  document.getElementById('clearTime').textContent = formatTime(totalTimeMs);
  renderGemCollection();
  showScreen('clear');
}

/* ===========================================================
   ゲーム開始
   =========================================================== */
function startGame() {
  initAudio();                      // ユーザー操作で音を有効化
  stage = 1;
  score = 0;
  totalTimeMs = 0;                  // タイムをリセット
  elPlay.style.setProperty('--combo', 0); // コンボ演出リセット
  gemCounts = {}; gemTotal = 0;     // 宝石コレクションをリセット
  document.getElementById('gemCount').textContent = 0;
  elStageNum.textContent = 1;
  clearTimers();
  stopBoss();                       // ボスの状態をリセット
  elPlay.classList.remove('crash');
  elTimerBar.classList.remove('danger');
  showScreen('play');
  nextProblem();
}

/* ===========================================================
   イベント登録
   =========================================================== */
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);
document.getElementById('clearRetryBtn').addEventListener('click', startGame);
document.getElementById('clearHomeBtn').addEventListener('click', () => showScreen('title'));
document.getElementById('overHomeBtn').addEventListener('click', () => showScreen('title'));
document.getElementById('zoneLeft').addEventListener('click', () => choose('left'));
document.getElementById('zoneRight').addEventListener('click', () => choose('right'));

// キーボードでも操作できるように（PCでの動作確認用）
document.addEventListener('keydown', (e) => {
  if (!screens.play.classList.contains('active')) return;
  if (e.key === 'ArrowLeft')  choose('left');
  if (e.key === 'ArrowRight') choose('right');
});

/* 確認用ショートカット：URLの末尾に #boss を付けると
   最終ステージ（ラスボス P.O.C. OVERLORD）からスタートする */
function jumpToBossIfRequested() {
  if (location.hash === '#boss') {
    startGame();
    stage = TOTAL_STAGES;
    score = TOTAL_STAGES - 1;
    nextProblem();
  }
}
window.addEventListener('hashchange', jumpToBossIfRequested);
jumpToBossIfRequested();

/* スピード線（集中線）を放射状に生成 */
(function buildSpeedlines() {
  const c = document.getElementById('speedlines');
  if (!c) return;
  const N = 18;
  for (let i = 0; i < N; i++) {
    const s = document.createElement('span');
    const ang = (360 / N) * i + (Math.random() * 12 - 6);
    s.style.setProperty('--a', ang.toFixed(1) + 'deg');
    s.style.animationDelay = (-(Math.random() * 1.25)).toFixed(2) + 's';
    c.appendChild(s);
  }
})();
</script>
